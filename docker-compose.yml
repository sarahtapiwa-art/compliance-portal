services:
  # =========================
  # BACKEND (Spring Boot)
  # =========================
  returns_tracking_service:
    build:
      context: /data/apps/compliance-returns
      dockerfile: Dockerfile
    image: returns-tracking-system:latest
    container_name: returns-tracking-system
    ports:
      - "18000:18000"
    env_file:
      - /data/apps/compliance-returns/.env
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JAVA_OPTS: "-Xmx512m -Xms256m"
    volumes:
      - /data/apps/compliance-returns/logs:/data/apps/compliance-returns/logs
      - /data/apps/compliance-returns/uploads:/data/apps/compliance-returns/uploads
      - /home/romeo.jerenyama/ssl-ecdsa:/data/apps/compliance-returns/ssl-ecdsa:ro
    restart: unless-stopped
    networks:
      - app-network

  # =========================
  # FRONTEND (Next.js)
  # =========================
  compliance:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: compliance-portal
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - returns_tracking_service
    networks:
      - app-network

  # =========================
  # NGINX (TLS TERMINATION)
  # =========================
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "3000:3000"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - compliance
    networks:
      - app-network

networks:
  app-network:

