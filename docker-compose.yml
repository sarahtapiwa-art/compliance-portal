version: '3.9'

services:
  nextjs:
    image:  nseremwe/nextjs-app:latest
    container_name: nextjs-app
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "3000:3000"  # your external HTTPS port
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./certs:/etc/nginx/certs
    depends_on:
      - nextjs
