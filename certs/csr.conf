[req]
default_bits = 256
prompt = no
default_md = sha256
distinguished_name = dn
req_extensions = req_ext
x509_extensions = v3_req
[dn]
C = US
ST = YourState
L = HARARE
O = NBS
CN = 192.168.3.143
[req_ext]
subjectAltName = @alt_names
keyUsage = digitalSignature, keyEncipherment
extendedKeyUsage = serverAuth
[alt_names]
DNS.1 = localhost
DNS.2 = 192.168.3.143
DNS.3 = backend.local
DNS.4 = frontend.local
IP.1 = 127.0.0.1
IP.2 = ::1
IP.3 = 192.168.3.143
[v3_req]
subjectAltName = @alt_names
keyUsage = digitalSignature, keyEncipherment
extendedKeyUsage = serverAuth
basicConstraints = CA:FALSE
