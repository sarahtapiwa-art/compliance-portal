events {}

http {
    server {
        listen 3000 ssl;
        server_name 192.168.3.143;

        # SSL certificates
        ssl_certificate     /etc/nginx/certs/server-ec.crt;
        ssl_certificate_key /etc/nginx/certs/server-ec.key;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        # =============================
        # FRONTEND (Next.js)
        # =============================
        location / {
            proxy_pass http://compliance:3000;  # Docker container name
            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
        }

        # =============================
        # BACKEND
        # =============================
        location /api/ {
            proxy_pass http://returns-tracking-system:18000;
            proxy_http_version 1.1;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}


